<style>
    /* 1. Reset and Full Height */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    body {
        display: flex;
        min-height: 100vh; /* Critical: keeps background color touching the bottom */
        background-color: rgb(226, 223, 223);
        font-family: sans-serif; /* Recommended for better text rendering */
    }

    /* 2. Sidebar - Fixed Width for consistency */
    #Sidebar {
        width: 300px; /* Instead of padding-right %, a fixed width scales better */
        flex-shrink: 0; /* Prevents the sidebar from getting squished by main content */
        padding: 25px;
        gap: 20px;
        background-color: rgb(151, 200, 131);
        display: flex;
        flex-direction: column;
        color: white;
    }

    /* 3. Text Wrapping Logic */
    .Sidebarbubble {
        background-color: rgb(173, 205, 161);
        border-radius: 25px;
        margin-bottom: 5px;
        width: 100%; 
        overflow-wrap: break-word; /* Essential for long repo links */
        word-wrap: break-word;
    }

    #Sidebar p {
        padding: 15px 20px; /* Balanced padding */
        font-size: 18px;
        margin: 0;
        line-height: 1.4;
        white-space: normal; 
    }

    /* 4. Main Container Scaling */
    #container {
        flex-grow: 1; /* Tells the container to fill all remaining space */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; /* Start content from top */
        padding: 50px 20px;
        background-color: rgb(226, 223, 223);
    }

    #github-profile {
        border-radius: 50%;
        border: 2px solid #000; 
        width: 200px;
    }

    /* 5. Responsive Switch */
    @media screen and (max-width: 768px) {
        body {
            flex-direction: column; /* Stacks sidebar on top of content for mobile */
        }
        #Sidebar {
            width: 100%;
            min-height: auto;
        }
    }
</style>

<script>
async function getGithubProfile(){
    const username = "acerrah002"
    const apiUrl = `https://api.github.com/users/${username}`;

    try {
        const response = await fetch(apiUrl);
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        const data = await response.json();
        document.getElementById('Bio').textContent = data.bio;
        document.getElementById('github-profile').src = data.avatar_url;
        document.getElementById('github-profile').alt = username;
        const nodes = document.getElementsByClassName('LinkToGithub');
        for (let i = 0; i < nodes.length; i++) {
            nodes[i].href = `https://github.com/${username}`;
        }
        const usernodes = document.getElementsByClassName('usernamedisplay');
        for (let i = 0; i < usernodes.length; i++) {
            usernodes[i].textContent = username;
        };
        const repoResponse = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=3`);
        const repos = await repoResponse.json();
        const repoContainer = document.getElementById('Repo');
        repoContainer.innerHTML = repos.map(repo => `<a href="${repo.html_url}">${repo.name}</a>`).join('<br>');
    }    
    catch (error) {
        console.error('Error fetching GitHub profile:', error);
    }
}
getGithubProfile();
</script>
