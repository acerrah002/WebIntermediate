<!DOCTYPE html>
<html lang="en">
<head></head>
<body>

<div id="container">
<h1 id="usernamedisplay"></h1>
<p>Bio</p>
<p id="Bio"></p>
<a class = "LinkToGithub" id = "test" >Github</a>
<a class="LinkToGithub"><img id = "github-profile" src="https://github.com"></a>
</div>

<style>
    #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    }

    #github-profile {
    border-radius: 50%;
    border: 2px solid #000; 
    width:200px;
    }
</style>

<script>
async function getGithubProfile(){
    const username = "acerrah002"
    const apiUrl = `https://api.github.com/users/${username}`;

    try {
        const response = await fetch(apiUrl);
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        const data = await response.json();
        document.getElementById('Bio').textContent = data.bio;
        document.getElementById('github-profile').src = data.avatar_url;
        document.getElementById('github-profile').alt = username;
        const nodes = document.getElementsByClassName('LinkToGithub');
        for (let i = 0; i < nodes.length; i++) {
            nodes[i].href = `https://github.com/${username}`;
        }
        document.getElementById('usernamedisplay').textContent = username;
    }    
    catch (error) {
        console.error('Error fetching GitHub profile:', error);
    }
}
getGithubProfile();
</script>
</body>
</html>
