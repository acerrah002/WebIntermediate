<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<h1>Acerra</h1>
<p>Contact Information</p>
<a href="https://github.com/acerrah002">Github</a>
<a href="https://github.com/acerrah002"><img id = "github-profile" src="https://github.com" alt="acerrah002" width="200" ></a>


<script>
async function getGithubProfile(){
    const username = "acerrah002"
    const apiUrl = `https://api.github.com/users/${username}`;

    try {
        const response = await fetch(apiUrl);
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        const data = await response.json();
        document.getElementById('github-profile').src = data.avatar_url;
    }    
    catch (error) {
        console.error('Error fetching GitHub profile:', error);
    }
}
getGithubProfile();
</script>
</body>
</html>
